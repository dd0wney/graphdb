# //nolint convention:
#
# When a lint rule needs to be silenced, prefer per-site `//nolint:LINTER`
# directives with a one-paragraph rationale comment over adding to the
# blanket exclusion lists below (errcheck.exclude-functions,
# gosec.excludes, etc.). Reasons:
#
#   - Per-site directives keep the lint rule active everywhere it has
#     actionable findings, so future violations still surface in review.
#   - The rationale paragraph in the source explains *why* this specific
#     site is an exception — useful for readers who didn't write it.
#   - Blanket excludes are easy to add and impossible to revisit: once a
#     function is excluded everywhere, real misuse becomes invisible.
#
# Established by PRs #54 (errcheck for logger writer self-failure),
# #57 (gosec for X.509 cert perms, sync.Once cancel, operator-controlled
# paths), and #58 (gocritic captLocal for matrix-notation parameters in
# pkg/search/lsa.go). Each documented their nolint sites with a paragraph
# explaining the specific exception above the line. Mirror that format
# for new ones.
#
version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
  disable:
    - dupl
    - goconst
    - gocyclo
    - godot
    - predeclared
    - unparam
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*github.com/dd0wney/graphdb/pkg/storage.GraphStorage).GetOutgoingEdges
        - (*github.com/dd0wney/graphdb/pkg/storage.GraphStorage).GetIncomingEdges
        - (*github.com/dd0wney/graphdb/pkg/storage.GraphStorage).GetNode
        - (*github.com/dd0wney/graphdb/pkg/lsm.Compactor).CleanupOldSSTables
        - (*github.com/dd0wney/graphdb/pkg/lsm.LSMStorage).compact
        - (*github.com/dd0wney/graphdb/pkg/lsm.BlockCache).evict
        - (*github.com/dd0wney/graphdb/pkg/lsm.BlockCache).Put
        - encoding/binary.Read
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - ifElseChain
        - appendAssign
        - elseif
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G404
        - G114
        - G115
      severity: medium
      confidence: medium
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    nakedret:
      max-func-lines: 30
    revive:
      severity: warning
      # The 'exported' rule (godoc on every exported symbol) was inherited
      # from the v1 config but has never been enforced — the codebase has
      # ~48 exported types without godoc that would all need backfilling.
      # Re-enable when the team commits to that convention; flag a single
      # missing godoc as a code-review concern in the meantime.
      rules:
        - name: var-naming
          severity: warning
        - name: indent-error-flow
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
          - ineffassign
        path: _test\.go
      - linters:
          - dupl
          - errcheck
          - gocritic
          - gocyclo
          - gosec
          - ineffassign
          - staticcheck
          - unused
        path: cmd/
      - linters:
          - errcheck
          - gocritic
          - govet
          - ineffassign
          - staticcheck
        path: pkg/query/
      - linters:
          - errcheck
          - gocritic
          - ineffassign
          - staticcheck
        path: pkg/storage/
      - linters:
          - errcheck
        path: pkg/replication/
      # pkg/graphql has many fallible operations; matches the
      # pkg/replication exclusion above.
      - linters:
          - errcheck
        path: pkg/graphql/
      # Known stale test helpers in pkg/storage/testhelpers_test.go that
      # the audit flagged as documentary (intentional infrastructure that
      # wasn't adopted). Out of scope for general lint cleanup.
      - linters:
          - unused
        path: pkg/storage/testhelpers_test\.go
      # enterprise_tests_framework.go has documentary fields (server, mu)
      # held for the framework's full shape even when current callers
      # don't exercise them.
      - linters:
          - unused
        path: enterprise_tests_framework\.go
      - linters:
          - lll
        source: '^//go:generate '
    paths:
      - third_party$
      - builtin$
      - ^examples/
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/dd0wney/graphdb
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
