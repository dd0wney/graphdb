version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
  disable:
    - dupl
    - goconst
    - gocyclo
    - godot
    - predeclared
    - unparam
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*github.com/dd0wney/cluso-graphdb/pkg/storage.GraphStorage).GetOutgoingEdges
        - (*github.com/dd0wney/cluso-graphdb/pkg/storage.GraphStorage).GetIncomingEdges
        - (*github.com/dd0wney/cluso-graphdb/pkg/storage.GraphStorage).GetNode
        - (*github.com/dd0wney/cluso-graphdb/pkg/lsm.Compactor).CleanupOldSSTables
        - (*github.com/dd0wney/cluso-graphdb/pkg/lsm.LSMStorage).compact
        - (*github.com/dd0wney/cluso-graphdb/pkg/lsm.BlockCache).evict
        - (*github.com/dd0wney/cluso-graphdb/pkg/lsm.BlockCache).Put
        - encoding/binary.Read
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - ifElseChain
        - appendAssign
        - elseif
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G404
        - G114
        - G115
      severity: medium
      confidence: medium
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    nakedret:
      max-func-lines: 30
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: indent-error-flow
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - gosec
          - ineffassign
        path: _test\.go
      - linters:
          - dupl
          - errcheck
          - gocritic
          - gocyclo
          - gosec
          - ineffassign
          - staticcheck
          - unused
        path: cmd/
      - linters:
          - errcheck
          - gocritic
          - govet
          - ineffassign
          - staticcheck
        path: pkg/query/
      - linters:
          - errcheck
          - gocritic
          - ineffassign
          - staticcheck
        path: pkg/storage/
      - linters:
          - errcheck
        path: pkg/replication/
      - linters:
          - lll
        source: '^//go:generate '
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/dd0wney/cluso-graphdb
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - cmd/
