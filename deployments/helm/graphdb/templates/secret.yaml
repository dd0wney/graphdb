{{- if not .Values.secrets.existingSecret }}
{{- /* Persist JWT_SECRET across upgrades: reuse the existing Secret's value if
       present, else an explicit override, else generate one (>=32 chars). */ -}}
{{- $secretName := printf "%s-secret" (include "graphdb.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $jwt := "" -}}
{{- if and $existing $existing.data (hasKey $existing.data "JWT_SECRET") -}}
{{- $jwt = index $existing.data "JWT_SECRET" | b64dec -}}
{{- end -}}
{{- if .Values.secrets.jwtSecret -}}
{{- $jwt = .Values.secrets.jwtSecret -}}
{{- end -}}
{{- if not $jwt -}}
{{- $jwt = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ $jwt | quote }}
  {{- with .Values.secrets.license }}
  GRAPHDB_LICENSE: {{ . | quote }}
  {{- end }}
  {{- if .Values.secrets.encryptionEnabled }}
  ENCRYPTION_ENABLED: "true"
  {{- with .Values.secrets.encryptionMasterKey }}
  ENCRYPTION_MASTER_KEY: {{ . | quote }}
  {{- end }}
  {{- end }}
{{- end }}
