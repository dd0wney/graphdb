apiVersion: v1
kind: Pod
metadata:
  name: {{ include "graphdb.fullname" . }}-test-connection
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["curl", "-fsS"]
      args:
        {{- if .Values.config.tls.enabled }}
        - --insecure
        {{- end }}
        - {{ printf "http%s://%s:%v/health" (ternary "s" "" .Values.config.tls.enabled) (include "graphdb.fullname" .) .Values.service.port | quote }}
