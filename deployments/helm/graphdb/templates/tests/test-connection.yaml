apiVersion: v1
kind: Pod
metadata:
  name: {{ include "graphdb.fullname" . }}-test-connection
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["curl", "-fsS"]
      args: ["http://{{ include "graphdb.fullname" . }}:{{ .Values.service.port }}/health"]
