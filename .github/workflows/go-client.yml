name: Go client
on:
  push:
    branches: [main]
    paths: ["clients/go/**", ".github/workflows/go-client.yml"]
  pull_request:
    paths: ["clients/go/**", ".github/workflows/go-client.yml"]

permissions:
  contents: read

jobs:
  build-test:
    name: build + vet + test + gofmt
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run gofmt -w ."; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...
