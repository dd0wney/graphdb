name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Full history for changelog

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'
        cache: true

    - name: Run tests
      run: make test

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Signing is best-effort: it only runs when a GPG key is configured, so an
    # unconfigured repo still produces a green (unsigned) release instead of a
    # red one. The key (created with UID "GraphDB Release <noreply@graphdb.io>")
    # is imported as-is — no quick-add-uid is needed.
    - name: Import GPG key
      if: startsWith(github.ref, 'refs/tags/v') && env.GPG_PRIVATE_KEY != ''
      run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

    - name: Sign release artifacts
      if: startsWith(github.ref, 'refs/tags/v') && env.GPG_PRIVATE_KEY != ''
      run: |
        cd dist
        for file in *.tar.gz checksums.txt; do
          if [ -f "$file" ]; then
            echo "Signing $file..."
            printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign --armor "$file"
          fi
        done
        # publish the release public key alongside the signatures
        gpg --armor --export "GraphDB Release <noreply@graphdb.io>" > graphdb-release-pubkey.asc
        ls -la *.asc

    - name: Upload signatures to release
      if: startsWith(github.ref, 'refs/tags/v') && env.GPG_PRIVATE_KEY != ''
      uses: softprops/action-gh-release@v3
      with:
        files: dist/*.asc
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/graphdb
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
