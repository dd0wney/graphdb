name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on Go ${{ matrix.go-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # go.mod declares `go 1.26.0`, so 1.26 is the build floor — older
        # toolchains can no longer build the module (2026-06-01 perf-track bump).
        go-version: ['1.26']
        # Ubuntu runners hit external-SIGTERM exit-143 on test-verbose/test-race
        # consistently (CLAUDE.md § "Known infra patterns"; NEXT_STEPS_2026-05-13.md
        # § Track H). macOS-only matrix until the contention root cause is addressed.
        # Build/tagged-build jobs below stay on ubuntu-latest (short-running; produce
        # Linux artifacts; not subject to the SIGTERM pattern).
        os: [macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum

    - name: Verify dependencies
      run: |
        go mod verify
        go mod download

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt check
      run: |
        fmt_output=$(go fmt ./...)
        if [ -n "$fmt_output" ]; then
          echo "❌ The following files need formatting:"
          echo "$fmt_output"
          exit 1
        fi
        echo "✅ All files properly formatted"

    - name: Run tests
      run: make test-verbose

    - name: Run tests with race detector
      run: make test-race

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run tests with coverage
      run: make test-cover

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run benchmarks
      run: make bench

    - name: Archive benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: coverage/
        retention-days: 7

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Build all binaries
      run: make build-all

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries-linux
        path: bin/
        retention-days: 7

  tagged-build-nng:
    name: Tagged Build (-tags nng)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Build with -tags nng
      run: go build -tags nng ./...

    - name: Vet with -tags nng
      run: go vet -tags nng ./...

  simd-int8:
    name: int8 SIMD kernel (amd64, GOEXPERIMENT=simd)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: int8 SIMD kernel (amd64, GOEXPERIMENT=simd)
      run: |
        GOEXPERIMENT=simd go build ./pkg/vector/
        GOEXPERIMENT=simd go test ./pkg/vector/ -run 'TestDotInt8' -count=1 -v

    - name: int8 SIMD benchmark (amd64)
      run: GOEXPERIMENT=simd go test ./pkg/vector/ -run '^$' -bench 'BenchmarkDotInt8' -benchmem -count=6
