name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: false  # golangci-lint-action has its own cache

    - name: Run golangci-lint
      # @v4-@v6 only support golangci-lint v1. The repo's
      # .golangci.yml is v2 format, so we need @v7+ which added
      # golangci-lint v2 support. Pin to v2.11.4 — the dev
      # environment's version, verified with `config verify`
      # locally. "latest" bumps to v2.x.y with stricter schema
      # validation that rejects fields the repo's config uses.
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.4
        args: --timeout=5m
        only-new-issues: false
        skip-cache: false

  go-mod-tidy:
    name: Check go.mod and go.sum
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Check if go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
        if [ $? -ne 0 ]; then
          echo "❌ go.mod or go.sum needs tidying"
          echo "Run: go mod tidy"
          exit 1
        fi
        echo "✅ go.mod and go.sum are tidy"

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: '-no-fail -fmt=json -out=results.json ./...'

    - name: Upload security results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: results.json
        retention-days: 30
